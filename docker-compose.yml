services:
  postgres:
    image: postgres:17-alpine
    container_name: home-sensor-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: home_sensor_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d home_sensor_hub
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
